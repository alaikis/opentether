<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>OpenTether 安装向导</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }

            .wizard-container {
                background: #fff;
                border-radius: 16px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                width: 100%;
                max-width: 600px;
                overflow: hidden;
            }

            .wizard-header {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: #fff;
                padding: 40px;
                text-align: center;
            }

            .wizard-header h1 {
                font-size: 28px;
                margin-bottom: 8px;
            }

            .wizard-header p {
                opacity: 0.9;
                font-size: 14px;
            }

            .wizard-progress {
                display: flex;
                justify-content: space-between;
                padding: 24px 40px;
                background: #f8f9fa;
                border-bottom: 1px solid #e9ecef;
            }

            .progress-step {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .step-number {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: #dee2e6;
                color: #6c757d;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                font-weight: 600;
            }

            .step-number.active {
                background: #667eea;
                color: #fff;
            }

            .step-number.completed {
                background: #28a745;
                color: #fff;
            }

            .step-label {
                font-size: 13px;
                color: #6c757d;
            }

            .step-label.active {
                color: #667eea;
                font-weight: 500;
            }

            .wizard-content {
                padding: 40px;
            }

            .step {
                display: none;
            }

            .step.active {
                display: block;
            }

            .form-group {
                margin-bottom: 24px;
            }

            .form-group label {
                display: block;
                margin-bottom: 8px;
                font-weight: 500;
                color: #333;
            }

            .form-group input,
            .form-group select {
                width: 100%;
                padding: 12px 16px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font-size: 14px;
                transition: border-color 0.2s;
            }

            .form-group input:focus,
            .form-group select:focus {
                outline: none;
                border-color: #667eea;
            }

            .form-group .hint {
                font-size: 12px;
                color: #6c757d;
                margin-top: 4px;
            }

            .form-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }

            .wizard-footer {
                padding: 24px 40px;
                background: #f8f9fa;
                display: flex;
                justify-content: space-between;
                gap: 12px;
            }

            .btn {
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                border: none;
                transition: all 0.2s;
            }

            .btn-secondary {
                background: #e9ecef;
                color: #495057;
            }

            .btn-secondary:hover {
                background: #dee2e6;
            }

            .btn-primary {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: #fff;
            }

            .btn-primary:hover {
                opacity: 0.9;
                transform: translateY(-1px);
            }

            .btn:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }

            .alert {
                padding: 12px 16px;
                border-radius: 8px;
                margin-bottom: 20px;
                font-size: 14px;
            }

            .alert-error {
                background: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
            }

            .alert-success {
                background: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }

            .db-type-selector {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
                margin-bottom: 20px;
            }

            .db-type-option {
                padding: 16px;
                border: 2px solid #ddd;
                border-radius: 8px;
                cursor: pointer;
                text-align: center;
                transition: all 0.2s;
            }

            .db-type-option:hover {
                border-color: #667eea;
            }

            .db-type-option.selected {
                border-color: #667eea;
                background: #f0f4ff;
            }

            .db-type-option .icon {
                font-size: 24px;
                margin-bottom: 8px;
            }

            .db-type-option .name {
                font-weight: 500;
                color: #333;
            }

            .success-screen {
                text-align: center;
                padding: 40px 20px;
            }

            .success-screen .icon {
                width: 80px;
                height: 80px;
                background: #28a745;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 24px;
                font-size: 40px;
                color: #fff;
            }

            .success-screen h2 {
                color: #28a745;
                margin-bottom: 12px;
            }

            .success-screen p {
                color: #6c757d;
                margin-bottom: 24px;
            }

            .success-screen .btn {
                display: inline-block;
            }
        </style>
    </head>
    <body>
        <div class="wizard-container">
            <div class="wizard-header">
                <h1>🚀 OpenTether 安装向导</h1>
                <p>欢迎使用 OpenTether Enterprise AI Agent 系统</p>
            </div>

            <div class="wizard-progress">
                <div class="progress-step">
                    <span class="step-number active" data-step="1">1</span>
                    <span class="step-label active" id="label-1"
                        >数据库配置</span
                    >
                </div>
                <div class="progress-step">
                    <span class="step-number" data-step="2">2</span>
                    <span class="step-label" id="label-2">管理员账号</span>
                </div>
                <div class="progress-step">
                    <span class="step-number" data-step="3">3</span>
                    <span class="step-label" id="label-3">系统配置</span>
                </div>
                <div class="progress-step">
                    <span class="step-number" data-step="4">4</span>
                    <span class="step-label" id="label-4">邮件配置</span>
                </div>
            </div>

            <div class="wizard-content">
                <!-- Step 1: Database Configuration -->
                <div class="step active" id="step-1">
                    <div class="db-type-selector">
                        <div
                            class="db-type-option selected"
                            data-type="sqlite"
                            onclick="selectDBType('sqlite')"
                        >
                            <div class="icon">📁</div>
                            <div class="name">SQLite</div>
                        </div>
                        <div
                            class="db-type-option"
                            data-type="mysql"
                            onclick="selectDBType('mysql')"
                        >
                            <div class="icon">🐬</div>
                            <div class="name">MySQL</div>
                        </div>
                        <div
                            class="db-type-option"
                            data-type="postgres"
                            onclick="selectDBType('postgres')"
                        >
                            <div class="icon">🐘</div>
                            <div class="name">PostgreSQL</div>
                        </div>
                    </div>

                    <div id="db-fields">
                        <!-- MySQL/PostgreSQL fields (shown when not SQLite) -->
                        <div
                            class="form-row"
                            id="db-connection"
                            style="display: none"
                        >
                            <div class="form-group">
                                <label>主机地址</label>
                                <input
                                    type="text"
                                    id="db-host"
                                    placeholder="localhost"
                                />
                            </div>
                            <div class="form-group">
                                <label>端口</label>
                                <input
                                    type="number"
                                    id="db-port"
                                    placeholder="3306"
                                />
                            </div>
                        </div>
                        <div
                            class="form-group"
                            id="db-user-row"
                            style="display: none"
                        >
                            <label>用户名</label>
                            <input
                                type="text"
                                id="db-user"
                                placeholder="root"
                            />
                        </div>
                        <div
                            class="form-group"
                            id="db-password-row"
                            style="display: none"
                        >
                            <label>密码</label>
                            <input
                                type="password"
                                id="db-password"
                                placeholder="输入数据库密码"
                            />
                        </div>
                        <div
                            class="form-group"
                            id="db-name-row"
                            style="display: none"
                        >
                            <label>数据库名</label>
                            <input
                                type="text"
                                id="db-name"
                                placeholder="opentether"
                            />
                            <div class="hint">请提前创建此数据库</div>
                        </div>
                    </div>
                </div>

                <!-- Step 2: Admin Account -->
                <div class="step" id="step-2">
                    <div class="form-group">
                        <label>用户名</label>
                        <input
                            type="text"
                            id="admin-username"
                            placeholder="admin"
                        />
                        <div class="hint">登录账号</div>
                    </div>
                    <div class="form-group">
                        <label>显示名称</label>
                        <input
                            type="text"
                            id="admin-name"
                            placeholder="系统管理员"
                        />
                    </div>
                    <div class="form-group">
                        <label>邮箱</label>
                        <input
                            type="email"
                            id="admin-email"
                            placeholder="admin@example.com"
                        />
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input
                            type="password"
                            id="admin-password"
                            placeholder="至少6位"
                        />
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input
                            type="password"
                            id="admin-password-confirm"
                            placeholder="再次输入密码"
                        />
                    </div>
                </div>

                <!-- Step 3: System Config -->
                <div class="step" id="step-3">
                    <div class="form-group">
                        <label>系统名称</label>
                        <input
                            type="text"
                            id="admin-title"
                            value="OpenTether 管理后台"
                        />
                        <div class="hint">显示在浏览器标签和页面顶部</div>
                    </div>
                    <div class="form-group">
                        <label>主题风格</label>
                        <select id="theme">
                            <option value="light">浅色模式</option>
                            <option value="dark">深色模式</option>
                        </select>
                    </div>
                </div>

                <!-- Step 4: SMTP Config -->
                <div class="step" id="step-4">
                    <div class="form-group">
                        <label>
                            <input
                                type="checkbox"
                                id="smtp-enabled"
                                style="width: auto; margin-right: 8px"
                            />
                            启用邮件通知
                        </label>
                        <div class="hint">
                            启用后，系统将通过 SMTP 发送邮件通知
                        </div>
                    </div>
                    <div id="smtp-fields">
                        <div class="form-group">
                            <label>SMTP 服务器</label>
                            <input
                                type="text"
                                id="smtp-host"
                                placeholder="smtp.example.com"
                            />
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>端口</label>
                                <input
                                    type="number"
                                    id="smtp-port"
                                    placeholder="587"
                                    value="587"
                                />
                            </div>
                            <div class="form-group">
                                <label>加密方式</label>
                                <select id="smtp-encryption">
                                    <option value="tls">TLS</option>
                                    <option value="ssl">SSL</option>
                                    <option value="none">无</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>用户名</label>
                            <input
                                type="text"
                                id="smtp-username"
                                placeholder="your-email@example.com"
                            />
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input
                                type="password"
                                id="smtp-password"
                                placeholder="SMTP 密码或授权码"
                            />
                        </div>
                        <div class="form-group">
                            <label>发件人邮箱</label>
                            <input
                                type="email"
                                id="smtp-from-email"
                                placeholder="noreply@example.com"
                            />
                        </div>
                        <div class="form-group">
                            <label>发件人名称</label>
                            <input
                                type="text"
                                id="smtp-from-name"
                                value="Wisehoof System"
                            />
                        </div>
                        <div class="form-group">
                            <label>收件人邮箱</label>
                            <input
                                type="email"
                                id="smtp-to-email"
                                placeholder="admin@example.com"
                            />
                            <div class="hint">用于接收系统通知邮件</div>
                        </div>
                    </div>
                </div>

                <!-- Success Screen -->
                <div class="step" id="step-success">
                    <div class="success-screen">
                        <div class="icon">✓</div>
                        <h2>安装成功！</h2>
                        <p>系统已初始化完成，现在可以开始使用。</p>
                        <button class="btn btn-primary" onclick="goToAdmin()">
                            进入管理后台
                        </button>
                    </div>
                </div>
            </div>

            <div class="wizard-footer" id="wizard-footer">
                <button
                    class="btn btn-secondary"
                    id="btn-prev"
                    onclick="prevStep()"
                    style="display: none"
                >
                    上一步
                </button>
                <div style="flex: 1"></div>
                <button
                    class="btn btn-primary"
                    id="btn-next"
                    onclick="nextStep()"
                >
                    下一步
                </button>
            </div>
        </div>

        <script>
            let currentStep = 1;
            const totalSteps = 4;
            let dbType = "sqlite";

            function selectDBType(type) {
                dbType = type;
                document.querySelectorAll(".db-type-option").forEach((opt) => {
                    opt.classList.remove("selected");
                    if (opt.dataset.type === type) {
                        opt.classList.add("selected");
                    }
                });

                // Show/hide fields based on DB type
                const isExternal = type !== "sqlite";
                document.getElementById("db-connection").style.display =
                    isExternal ? "grid" : "none";
                document.getElementById("db-user-row").style.display =
                    isExternal ? "block" : "none";
                document.getElementById("db-password-row").style.display =
                    isExternal ? "block" : "none";
                document.getElementById("db-name-row").style.display =
                    isExternal ? "block" : "none";

                // Set default port
                if (type === "mysql") {
                    document.getElementById("db-port").value = 3306;
                } else if (type === "postgres") {
                    document.getElementById("db-port").value = 5432;
                }
            }

            // 控制 SMTP 字段的显示/隐藏
            function toggleSMTPFields() {
                const smtpEnabled =
                    document.getElementById("smtp-enabled").checked;
                document.getElementById("smtp-fields").style.display =
                    smtpEnabled ? "block" : "none";
            }

            // 为 SMTP 复选框添加事件监听器
            document
                .getElementById("smtp-enabled")
                .addEventListener("change", toggleSMTPFields);

            function updateUI() {
                // Update step numbers
                for (let i = 1; i <= totalSteps; i++) {
                    const stepNum = document.querySelector(
                        `.step-number[data-step="${i}"]`,
                    );
                    const stepLabel = document.getElementById(`label-${i}`);

                    stepNum.classList.remove("active", "completed");
                    stepLabel.classList.remove("active");

                    if (i < currentStep) {
                        stepNum.classList.add("completed");
                        stepNum.textContent = "✓";
                    } else if (i === currentStep) {
                        stepNum.classList.add("active");
                        stepLabel.classList.add("active");
                    }
                }

                // Show/hide steps
                document.querySelectorAll(".step").forEach((step) => {
                    step.classList.remove("active");
                });
                document
                    .getElementById(`step-${currentStep}`)
                    .classList.add("active");

                // Update buttons
                document.getElementById("btn-prev").style.display =
                    currentStep > 1 ? "block" : "none";
                document.getElementById("btn-next").textContent =
                    currentStep === totalSteps ? "完成配置" : "下一步";
            }

            function validateStep(step) {
                if (step === 1) {
                    if (dbType !== "sqlite") {
                        const host = document.getElementById("db-host").value;
                        const port = document.getElementById("db-port").value;
                        const user = document.getElementById("db-user").value;
                        const password =
                            document.getElementById("db-password").value;
                        const dbName = document.getElementById("db-name").value;

                        if (!host || !port || !user || !dbName) {
                            alert("请填写完整的数据库连接信息");
                            return false;
                        }
                    }
                } else if (step === 2) {
                    const username =
                        document.getElementById("admin-username").value;
                    const name = document.getElementById("admin-name").value;
                    const email = document.getElementById("admin-email").value;
                    const password =
                        document.getElementById("admin-password").value;
                    const confirm = document.getElementById(
                        "admin-password-confirm",
                    ).value;

                    if (!username || !name || !email || !password) {
                        alert("请填写完整的管理员信息");
                        return false;
                    }

                    if (password.length < 6) {
                        alert("密码至少需要6位");
                        return false;
                    }

                    if (password !== confirm) {
                        alert("两次输入的密码不一致");
                        return false;
                    }
                } else if (step === 4) {
                    // 步骤 4: SMTP 配置验证
                    const smtpEnabled =
                        document.getElementById("smtp-enabled").checked;
                    if (smtpEnabled) {
                        const host = document.getElementById("smtp-host").value;
                        const port = document.getElementById("smtp-port").value;
                        const username =
                            document.getElementById("smtp-username").value;
                        const password =
                            document.getElementById("smtp-password").value;
                        const fromEmail =
                            document.getElementById("smtp-from-email").value;
                        const toEmail =
                            document.getElementById("smtp-to-email").value;

                        if (
                            !host ||
                            !port ||
                            !username ||
                            !password ||
                            !fromEmail ||
                            !toEmail
                        ) {
                            alert("请填写完整的 SMTP 配置信息");
                            return false;
                        }
                    }
                }
                return true;
            }

            async function nextStep() {
                if (!validateStep(currentStep)) {
                    return;
                }

                if (currentStep < totalSteps) {
                    currentStep++;
                    updateUI();
                } else {
                    // Submit configuration
                    await submitSetup();
                }
            }

            function prevStep() {
                if (currentStep > 1) {
                    currentStep--;
                    updateUI();
                }
            }

            async function submitSetup() {
                const btn = document.getElementById("btn-next");
                btn.disabled = true;
                btn.textContent = "提交中...";

                const data = {
                    db_type: dbType,
                    db_host:
                        document.getElementById("db-host").value || "localhost",
                    db_port:
                        parseInt(document.getElementById("db-port").value) ||
                        3306,
                    db_user: document.getElementById("db-user").value || "root",
                    db_password:
                        document.getElementById("db-password").value || "",
                    db_name:
                        document.getElementById("db-name").value ||
                        "opentether",

                    admin_username:
                        document.getElementById("admin-username").value,
                    admin_name: document.getElementById("admin-name").value,
                    admin_email: document.getElementById("admin-email").value,
                    admin_password:
                        document.getElementById("admin-password").value,

                    admin_title: document.getElementById("admin-title").value,
                    theme: document.getElementById("theme").value,

                    // SMTP 配置
                    smtp_enabled:
                        document.getElementById("smtp-enabled").checked,
                    smtp_host: document.getElementById("smtp-host").value,
                    smtp_port:
                        parseInt(document.getElementById("smtp-port").value) ||
                        587,
                    smtp_username:
                        document.getElementById("smtp-username").value,
                    smtp_password:
                        document.getElementById("smtp-password").value,
                    smtp_encryption:
                        document.getElementById("smtp-encryption").value,
                    smtp_from_email:
                        document.getElementById("smtp-from-email").value,
                    smtp_from_name:
                        document.getElementById("smtp-from-name").value,
                    smtp_to_email:
                        document.getElementById("smtp-to-email").value,
                };

                try {
                    const response = await fetch("/api/v1/setup", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify(data),
                    });

                    const result = await response.json();

                    if (result.success) {
                        // Show success screen
                        document.getElementById("wizard-footer").style.display =
                            "none";
                        document.querySelector(
                            ".wizard-progress",
                        ).style.display = "none";
                        document
                            .getElementById("step-success")
                            .classList.add("active");
                        document
                            .getElementById("step-4")
                            .classList.remove("active");
                    } else {
                        alert(result.message || "初始化失败，请重试");
                        btn.disabled = false;
                        btn.textContent = "完成配置";
                    }
                } catch (error) {
                    alert("网络错误，请重试");
                    btn.disabled = false;
                    btn.textContent = "完成配置";
                }
            }

            function goToAdmin() {
                window.location.href = "/admin";
            }

            // Initialize
            selectDBType("sqlite");
            toggleSMTPFields();
        </script>
    </body>
</html>
